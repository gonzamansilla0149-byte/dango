<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Dango | Categoría</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script>
  const savedTheme = localStorage.getItem("store_theme");

  if (savedTheme) {
    const theme = JSON.parse(savedTheme);
    const root = document.documentElement;

    if (theme.primary_color) root.style.setProperty("--store-primary", theme.primary_color);
    if (theme.secondary_color) root.style.setProperty("--store-secondary", theme.secondary_color);
    if (theme.accent_color) root.style.setProperty("--store-accent", theme.accent_color);
    if (theme.background_color) root.style.setProperty("--store-background", theme.background_color);
    if (theme.surface_color) root.style.setProperty("--store-surface", theme.surface_color);
    if (theme.text_color) root.style.setProperty("--store-text", theme.text_color);
    if (theme.muted_color) root.style.setProperty("--store-muted", theme.muted_color);
    if (theme.border_color) root.style.setProperty("--store-border", theme.border_color);
  }
</script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="site-header">
  <div class="header-top">
    <a href="index.html" class="logo">DANGO</a>

<div class="search-bar">
  <input type="text" id="global-search" placeholder="Buscar productos">
  <div class="search-results" id="search-results"></div>
</div>
    
<div class="header-actions">

  <div class="account-wrapper">
    <button id="btn-login" class="icon-btn">👤</button>

    <div class="account-dropdown" id="account-dropdown">
      <a href="#" class="account-item" id="open-login">Iniciar sesión</a>
      <a href="#" class="account-item" id="open-register">Crear cuenta</a>
      <button class="account-item" id="logout-btn" style="display:none;">
        Cerrar sesión
      </button>
    </div>
  </div>

  <a href="#" id="btn-cart" class="icon-btn cart-btn" title="Carrito">
    🛒
    <span id="cart-count" class="cart-badge">0</span>
  </a>

</div>
  </div>
<nav class="main-nav">
<div class="nav-links" id="nav-links"></div>
</nav>

</header>

<!-- ================= BREADCRUMB ================= -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- ================= MAIN ================= -->
<main class="shop-layout">

  <!-- ========== SIDEBAR ========== -->
<aside class="sidebar">

<!-- CATEGORÍA (solo mostrar seleccionada) -->
<div class="filter-group">
  <button class="filter-toggle">
    Categoría <span>▾</span>
  </button>
  <div class="filter-content" id="category-filter"></div>
</div>

<!-- SUBCATEGORÍAS -->
<div class="filter-group">
  <button class="filter-toggle">
    Subcategorías <span>▾</span>
  </button>
  <div class="filter-content" id="subcategory-filter"></div>
</div>

<!-- MARCAS -->
<div class="filter-group">
  <button class="filter-toggle">
    Marcas <span>▾</span>
  </button>
  <div class="filter-content" id="brand-filter"></div>
</div>

<!-- PRECIO -->
<div class="filter-group">
  <button class="filter-toggle">
    Precio <span>▾</span>
  </button>
  <div class="filter-content" id="price-filter">
    <button data-price="0-50000">Hasta $50.000</button>
    <button data-price="50000-100000">$50.000 - $100.000</button>
    <button data-price="100000-99999999">+ $100.000</button>
  </div>
</div>

</aside>
  <!-- ========== CONTENT ========== -->
  <section class="shop-content">

    <!-- HEADER DE CATEGORÍA -->
    <div class="category-header">
      <div>
        <h1 id="category-title"></h1>
        <span class="results-count">128 productos</span>
      </div>

      <div class="sort">
        <label>Ordenar por</label>
        <select>
          <option>Relevancia</option>
          <option>Menor precio</option>
          <option>Mayor precio</option>
          <option>Más vendidos</option>
        </select>
      </div>
    </div>

    <!-- GRID DE PRODUCTOS -->
<div class="products-grid" id="category-products">
  <!-- Se renderiza dinámicamente -->
</div>

<div class="pagination" id="pagination"></div>

  </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="site-footer">
  <div class="footer-columns">
    <div>
      <h4>Dango</h4>
      <p>Tecnología y herramientas</p>
    </div>
    <div>
      <h4>Ayuda</h4>
      <a href="#">Contacto</a><br>
      <a href="#">Envíos</a>
    </div>
    <div>
      <h4>Legal</h4>
      <a href="#">Términos</a><br>
      <a href="#">Privacidad</a>
    </div>
  </div>
</footer>


<script src="assets/js/main.js"></script>
<script src="assets/js/category.js"></script>
<script src="assets/js/cart.js"></script>

<script type="module" src="assets/js/auth-ui.js"></script>
<script src="assets/js/auth.js"></script>

<!-- ================= CART DRAWER ================= -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-panel">

    <div class="cart-header">
      <h3>Tu carrito</h3>
      <span id="close-cart">✕</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-summary">
      <div class="cart-total">
        Total: <span id="cart-total">$0</span>
      </div>

      <button id="btn-checkout" class="checkout-btn">
        Ir a pagar
      </button>
    </div>

  </div>
</div>
  
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Dango | Producto</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script>
  const savedTheme = localStorage.getItem("store_theme");

  if (savedTheme) {
    const theme = JSON.parse(savedTheme);
    const root = document.documentElement;

    if (theme.primary_color) root.style.setProperty("--store-primary", theme.primary_color);
    if (theme.secondary_color) root.style.setProperty("--store-secondary", theme.secondary_color);
    if (theme.accent_color) root.style.setProperty("--store-accent", theme.accent_color);
    if (theme.background_color) root.style.setProperty("--store-background", theme.background_color);
    if (theme.surface_color) root.style.setProperty("--store-surface", theme.surface_color);
    if (theme.text_color) root.style.setProperty("--store-text", theme.text_color);
    if (theme.muted_color) root.style.setProperty("--store-muted", theme.muted_color);
    if (theme.border_color) root.style.setProperty("--store-border", theme.border_color);
  }
</script>
  
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-top">
    <a href="index.html" class="logo">DANGO</a>

<div class="search-bar">
  <input type="text" id="global-search" placeholder="Buscar productos">
  <div class="search-results" id="search-results"></div>
</div>

<div class="header-actions">

  <div class="account-wrapper">
    <button id="btn-login" class="icon-btn">👤</button>

    <div class="account-dropdown" id="account-dropdown">
      <a href="#" class="account-item" id="open-login">Iniciar sesión</a>
      <a href="#" class="account-item" id="open-register">Crear cuenta</a>
      <button class="account-item" id="logout-btn" style="display:none;">
        Cerrar sesión
      </button>
    </div>
  </div>

  <a href="#" id="btn-cart" class="icon-btn cart-btn" title="Carrito">
    🛒
    <span id="cart-count" class="cart-badge">0</span>
  </a>

</div>
  </div>

<nav class="main-nav">

  <!-- LINKS DESKTOP -->
<div class="nav-links" id="nav-links"></div>
  <!-- BOTÓN MOBILE -->
  <button class="btn-categories" id="btn-categories">
    ☰ Categorías
  </button>

  <!-- DROPDOWN MOBILE -->
<div class="categories-dropdown" id="categories-dropdown"></div>

</nav>




</header>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="index.html">Inicio</a> / 
  <a href="categoria.html?cat=herramientas">Herramientas</a> / 
  <span class="breadcrumb-product"></span>
</div>

<!-- MAIN -->
<main class="product-page">

<div class="product-container">

  <!-- 1️⃣ GALERÍA -->
  <div class="product-gallery">
    <div class="main-image"></div>

    <div class="thumbnail-list">
    </div>
  </div>

  <!-- 2️⃣ DETALLES DEL PRODUCTO -->
<div class="product-details">

  <div class="brand-sold">
    <span class="product-brand"></span>
    <span class="sold-count">| <span class="sold-units"></span> vendidos</span>
  </div>

  <h1 class="product-title"></h1>

  <p class="product-price"></p>

  <div class="product-description"></div>

  <div class="product-features"></div>

</div>


  <!-- 3️⃣ CARD DE COMPRA -->
 <div class="product-purchase-card">

  <div class="shipping-info">
    <p>🚚 Envío gratis a todo el país</p>
    <p>📦 Llega en 2-4 días hábiles</p>
  </div>

  <div class="quantity-selector">
    <button class="qty-minus">-</button>
    <input type="number" value="1" min="1">
    <button class="qty-plus">+</button>
  </div>

  <p class="stock-info">
    Stock disponible: <span class="stock-units"></span>
  </p>

<button class="buy-now-btn" id="buy-now-btn">
  Comprar ahora
</button>

<div class="quick-checkout" id="quick-checkout">

  <input type="text" placeholder="Nombre completo" class="qc-input" required>
  <input type="text" placeholder="Dirección" class="qc-input" required>
  <input type="text" placeholder="Ciudad" class="qc-input" required>
  <input type="text" placeholder="Código Postal" class="qc-input" required>
  <input type="tel" placeholder="Teléfono" class="qc-input" required>

</div>

  <button class="add-to-cart-btn">
    Agregar al carrito
  </button>

  <div class="purchase-benefits">
    <p>✔ Garantía oficial</p>
    <p>✔ Compra 100% segura</p>
  </div>

</div>

</div>

</main>

<!-- PRODUCTOS RELACIONADOS -->
<section class="related-products">
  <div class="related-container">

    <h2 class="related-title">Productos relacionados</h2>

    <div class="related-slider">
   <div class="related-track" id="related-track">
  <!-- Productos relacionados se inyectan por JS -->
</div>
    </div>

  </div>
</section>

<!-- FOOTER (igual que los otros) -->
<footer class="site-footer">
  <!-- copiar footer -->
</footer>


<script src="assets/js/main.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/product.js"></script>

<script type="module" src="assets/js/auth-ui.js"></script>
<script src="assets/js/auth.js"></script>

<!-- ================= CART DRAWER ================= -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-panel">

    <div class="cart-header">
      <h3>Tu carrito</h3>
      <span id="close-cart">✕</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-summary">
      <div class="cart-total">
        Total: <span id="cart-total">$0</span>
      </div>

      <button id="btn-checkout" class="checkout-btn">
        Ir a pagar
      </button>
    </div>

  </div>
</div>
</body>
</html>
